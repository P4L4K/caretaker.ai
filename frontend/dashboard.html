            try {
                let url = API_BASE + '/recordings/my';
                if (selectedRecipientId) url += '?care_recipient_id=' + encodeURIComponent(selectedRecipientId);
                const res = await fetch(url, {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to list recordings');
                const data = await res.json();
                if (!data.recordings || !data.recordings.length) {
                    container.innerHTML = '<p class="muted">No recordings yet.</p>';
                    return;
                }
                data.recordings.forEach(rec => {
                    const div = document.createElement('div');
                    div.className = 'history-card';
                    div.innerHTML = `
                    <h4>${rec.filename}</h4>
                    <div class="meta">${new Date(rec.created_at).toLocaleString()}${rec.care_recipient_id ? ' • Recipient: ' + rec.care_recipient_id : ''}</div>
                `;
                    const controls = document.createElement('div');
                    controls.style.marginTop = '12px';
                    const playBtn = document.createElement('button');
                    playBtn.className = 'ghost-btn';
                    playBtn.textContent = 'Play';
                    playBtn.style.marginRight = '8px';
                    playBtn.addEventListener('click', () => playRecording(rec.id));
                    const dlBtn = document.createElement('button');
                    dlBtn.className = 'ghost-btn';
                    dlBtn.textContent = 'Download';
                    dlBtn.addEventListener('click', () => downloadRecording(rec.id, rec.filename));
                    controls.appendChild(playBtn);
                    controls.appendChild(dlBtn);
                    div.appendChild(controls);
                    container.appendChild(div);
                });
            } catch (err) {
                console.error('Error fetching recordings', err);
                container.innerHTML = '<p class="muted">Unable to load recordings.</p>';
            }
        }

        async function playRecording(id) {
            try {
                const res = await fetch(`${API_BASE}/recordings/${id}/download`, {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to fetch recording');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const audio = document.createElement('audio');
                audio.src = url;
                audio.controls = true;
                audio.autoplay = true;
                const container = document.getElementById('recordings-container');
                const wrapper = document.createElement('div');
                wrapper.appendChild(audio);
                container.insertBefore(wrapper, container.firstChild);
            } catch (err) {
                console.error('Error playing recording', err);
            }
        }

        async function downloadRecording(id, filename) {
            try {
                const res = await fetch(`${API_BASE}/recordings/${id}/download`, {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to fetch recording for download');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename || `recording_${id}.wav`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                setTimeout(() => URL.revokeObjectURL(url), 4000);
            } catch (err) {
                console.error('Error downloading recording', err);
            }
        }

        function showRecording(filename, url, mimeType = 'audio/wav') {
            const container = document.getElementById('recordings-container');
            const div = document.createElement('div');
            div.className = 'history-card';
            div.innerHTML = `
            <h4>${filename}</h4>
            <div class="meta">Local session • ${selectedRecipientName}</div>
            <audio controls style="width:100%;margin-top:12px;">
                <source src="${url}" type="${mimeType}">
            </audio>
        `;
            container.prepend(div);
        }

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { if (a.parentNode) a.parentNode.removeChild(a); }, 0);
        }

        // ==============================
        // Video / Emotion Monitoring & Fall Detection
        // ==============================

        // DOM elements for fall detection
        const videoUpload = document.getElementById('videoUpload');
        const fallDetectionResults = document.getElementById('fallDetectionResults');
        const fallDetectionStatus = document.getElementById('fallDetectionStatus');
        const fallDetectionOutput = document.getElementById('fallDetectionOutput');

        // Fall detection API endpoint
        const FALL_DETECTION_API = `${API_BASE}/api/fall-detection`;

        // Initialize video monitoring button
        if (startEmotionMonitorBtn) {
            startEmotionMonitorBtn.addEventListener('click', toggleEmotionMonitoring);
        }

        // Handle video file upload for fall detection
        if (videoUpload) {
            videoUpload.addEventListener('change', handleVideoUpload);
        }

        /**
         * Handles the video file upload for fall detection
         * @param {Event} event - The file input change event
         */
        async function handleVideoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Show loading state
            fallDetectionResults.style.display = 'block';
            fallDetectionStatus.textContent = 'Processing video...';
            fallDetectionStatus.style.color = '#38bdf8';
            fallDetectionOutput.innerHTML = '';

            const formData = new FormData();
            formData.append('file', file);  // Changed from 'video' to 'file' to match backend

            // Add recipient ID if one is selected
            if (selectedRecipientId) {
                formData.append('recipient_id', selectedRecipientId);
            }

            try {
                // First, upload the video for processing
                const response = await fetch(`${FALL_DETECTION_API}/process-video`, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                    // Don't set Content-Type header - let the browser set it with the boundary
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.detail || 'Failed to process video');
                }

                const result = await response.json();

                // If we get here, the request was successful
                fallDetectionStatus.textContent = 'Video processed successfully!';
                fallDetectionStatus.style.color = '#10b981';

                // Show the results
                if (result.falls_detected && result.falls_detected.length > 0) {
                    fallDetectionOutput.innerHTML = `
                    <div class="mt-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded">
                        <p class="font-bold">âš ï¸ Fall Detected!</p>
                        <p>Falls detected: ${result.falls_detected.length}</p>
                        <p>Confidence: ${(result.average_confidence * 100).toFixed(1)}%</p>
                    </div>
                `;

                    // If we have a processed video URL, show a link to view it
                    if (result.processed_video_url) {
                        const videoUrl = new URL(result.processed_video_url, window.location.origin).href;
                        fallDetectionOutput.innerHTML += `
                        <div class="mt-4">
                            <a href="${videoUrl}" target="_blank" 
                               class="inline-block bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                                View Processed Video
                            </a>
                        </div>
                    `;
                    }
                } else {
                    fallDetectionOutput.innerHTML = `
                    <div class="mt-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded">
                        <p>✅ No falls detected in the video.</p>
                    </div>
                `;
                }
            } catch (error) {
                console.error('Error processing video:', error);
                fallDetectionStatus.textContent = `Error: ${error.message}`;
                fallDetectionStatus.style.color = '#ef4444';
            } finally {
                // Reset the file input
                event.target.value = '';
            }
        }

        /**
         * Helper function to download the processed video
         * @param {string} url - The URL of the video to download
         * @param {string} filename - The filename to use for the downloaded file
         */
        function downloadVideo(url, filename) {
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                if (a.parentNode) a.parentNode.removeChild(a);
            }, 0);
        }

        async function toggleEmotionMonitoring() {
            if (!emotionMonitoringActive) {
                await startEmotionMonitoring();
            } else {
                stopEmotionMonitoring();
            }
        }

        async function startEmotionMonitoring() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    emotionStatusEl.textContent = 'Status: Camera not supported in this browser';
                    emotionStatusEl.style.color = '#fb7185';
                    return;
                }

                emotionStatusEl.textContent = 'Status: Requesting camera...';
                emotionStatusEl.style.color = '#38bdf8';

                emotionStream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false });
                emotionVideoEl.srcObject = emotionStream;

                emotionMonitoringActive = true;
                startEmotionMonitorBtn.textContent = 'Stop Video Monitoring';
                emotionStatusEl.textContent = 'Status: Camera on - analyzingâ€¦';

                if (emotionCaptureInterval) clearInterval(emotionCaptureInterval);
            } catch (err) {
                console.error('Error starting emotion monitoring:', err);
                emotionStatusEl.textContent = 'Status: Failed to access camera';
                emotionStatusEl.style.color = '#fb7185';
            }
        }

        function stopEmotionMonitoring() {
            emotionMonitoringActive = false;
            if (startEmotionMonitorBtn) startEmotionMonitorBtn.textContent = 'Start Video Monitoring';
            if (emotionCaptureInterval) {
                clearInterval(emotionCaptureInterval);
                emotionCaptureInterval = null;
            }
            if (emotionStream) {
                emotionStream.getTracks().forEach(t => t.stop());
                emotionStream = null;
            }
            if (emotionVideoEl) emotionVideoEl.srcObject = null;
            emotionStatusEl.textContent = 'Status: Camera off';
            emotionStatusEl.style.color = '#94a3b8';
        }

        async function captureAndSendEmotionFrame() {
            if (!emotionMonitoringActive || !emotionVideoEl || emotionVideoEl.readyState < 2) return;

            try {
                const canvas = document.createElement('canvas');
                canvas.width = emotionVideoEl.videoWidth || 640;
                canvas.height = emotionVideoEl.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(emotionVideoEl, 0, 0, canvas.width, canvas.height);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

                const res = await fetch(EMOTION_API_BASE + '/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: dataUrl })
                });

                if (!res.ok) {
                    console.warn('Emotion API error', res.status);
                    return;
                }

                const data = await res.json();

                if (!data || data.user_id === null || data.dominant_emotion === null) {
                    emotionCurrentEl.textContent = '—';
                    emotionConfidenceEl.textContent = '—';
                    return;
                }

                emotionCurrentEl.textContent = data.dominant_emotion;
                emotionConfidenceEl.textContent = data.confidence != null ? data.confidence.toFixed(1) + '%' : 'â€”';
            } catch (err) {
                console.error('Error capturing/sending emotion frame:', err);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'index.html';
        }

        function goToSettings() {
            window.location.href = 'settings.html';
        }

        // Add click handler for Logout button
        document.getElementById('logoutBtn')?.addEventListener('click', logout);



        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
        // Audio Analytics Functions
        // â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

        let audioTrendChart = null;

        async function fetchAudioAnalytics() {
            const days = document.getElementById('audioTimeRange').value || 7;
            const recipientParam = selectedRecipientId ? `&care_recipient_id=${selectedRecipientId}` : '';

            try {
                // Fetch statistics
                const statsRes = await fetch(`${API_BASE}/audio-events/stats?days=${days}${recipientParam}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!statsRes.ok) throw new Error('Failed to fetch audio stats');
                const stats = await statsRes.json();

                // Update summary cards
                document.getElementById('totalCoughs').textContent = stats.cough_count || 0;
                document.getElementById('totalSneezes').textContent = stats.sneeze_count || 0;
                document.getElementById('totalAudioEvents').textContent = stats.total_events || 0;

                // Fetch detailed events
                const eventsRes = await fetch(`${API_BASE}/audio-events?days=${days}&limit=100${recipientParam}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                if (!eventsRes.ok) throw new Error('Failed to fetch audio events');
                const events = await eventsRes.json();

                // Process and render charts
                renderAudioCharts(events, stats);
                renderRecentEvents(events.slice(0, 10));

            } catch (err) {
                console.error('Error fetching audio analytics:', err);
            }
        }

        function renderAudioCharts(events, stats) {
            // Process data for trend chart (daily aggregation)
            const dailyData = {};
            events.forEach(event => {
                const date = new Date(event.detected_at).toLocaleDateString();
                if (!dailyData[date]) {
                    dailyData[date] = { cough: 0, sneeze: 0 };
                }
                if (event.event_type === 'Cough') dailyData[date].cough++;
                if (event.event_type === 'Sneeze') dailyData[date].sneeze++;
            });

            const dates = Object.keys(dailyData).sort();
            const coughData = dates.map(d => dailyData[d].cough);
            const sneezeData = dates.map(d => dailyData[d].sneeze);

            // Trend Chart
            const trendCtx = document.getElementById('audioTrendChart');
            if (audioTrendChart) audioTrendChart.destroy();
            audioTrendChart = new Chart(trendCtx, {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: [
                        {
                            label: 'Coughs',
                            data: coughData,
                            borderColor: '#fb7185',
                            backgroundColor: 'rgba(251, 113, 133, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Sneezes',
                            data: sneezeData,
                            borderColor: '#f6c23e',
                            backgroundColor: 'rgba(246, 194, 62, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { stepSize: 1 } }
                    }
                }
            });

            // Removed Hourly and Event Type charts as per user request
        }

        function renderRecentEvents(events) {
            const container = document.getElementById('recentAudioEvents');

            if (!events || events.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: var(--muted);">
                        <i class="fas fa-headphones" style="font-size: 2rem; opacity: 0.3; margin-bottom: 12px;"></i>
                        <p>No recent events</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = events.map(event => {
                const date = new Date(event.detected_at);
                const timeStr = date.toLocaleTimeString();
                const dateStr = date.toLocaleDateString();
                const type = event.event_type.toLowerCase();
                const icon = type === 'cough' ? '😷' : type === 'sneeze' ? '🤧' : '🔊';

                return `
                    <div class="audio-event-item ${type}">
                        <div class="audio-event-icon ${type}">${icon}</div>
                        <div class="audio-event-details">
                            <div class="audio-event-type">${event.event_type}</div>
                            <div class="audio-event-time">${dateStr} at ${timeStr}</div>
                        </div>
                        <div class="audio-event-confidence">${event.confidence.toFixed(1)}%</div>
                    </div>
                `;
            }).join('');
        }

        // Event listeners for audio analytics
        const audioTimeRangeEl = document.getElementById('audioTimeRange');
        const refreshAudioStatsBtn = document.getElementById('refreshAudioStats');

        if (audioTimeRangeEl) {
            audioTimeRangeEl.addEventListener('change', fetchAudioAnalytics);
        }

        if (refreshAudioStatsBtn) {
            refreshAudioStatsBtn.addEventListener('click', fetchAudioAnalytics);
        }



        function showToast(message, type = 'success') {
            const toast = document.getElementById('uploadToast');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMessage');

            if (!toast) return;

            msg.textContent = message;
            icon.textContent = type === 'success' ? '✓' : '✕';
            toast.className = 'show ' + type;

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        fetchProfile();
        fetchAndRenderRecordings();
        fetchAudioAnalytics(); // Load audio analytics on page load

        // Periodic refresh for notifications and alerts (every 2 mins)
        setInterval(() => {
            fetchProfile();
        }, 120000);

        // Connect to Socket.IO for real-time audio updates
        const socketUrl = (typeof API_BASE !== 'undefined') ? API_BASE.replace('/api', '') : 'http://127.0.0.1:8000';
        const audioSocket = io(socketUrl, {
            transports: ['websocket'],
            upgrade: false
        });

        audioSocket.on('connect', () => {
            if (typeof token !== 'undefined' && token) {
                audioSocket.emit('authenticate', {
                    token: token,
                    care_recipient_id: typeof selectedRecipientId !== 'undefined' && selectedRecipientId ? parseInt(selectedRecipientId) : null
                });
            }
        });

        audioSocket.on('alert', (data) => {
            // Re-fetch analytics immediately to update dashboard in real-time
            fetchAudioAnalytics();
        });
    </script>
