<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareTaker &middot; Profile Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #eff6ff;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --border-light: rgba(226, 232, 240, 0.8);
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --nav-height: 70px;
            --bottom-nav-height: 75px;
            --pastel-mint: #B2F7EF;
            --pastel-peach: #FFDAC1;
            --pastel-lavender: #E2D1F9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            background-image:
                radial-gradient(at 0% 0%, var(--pastel-mint) 0px, transparent 50%),
                radial-gradient(at 100% 0%, var(--pastel-peach) 0px, transparent 50%),
                radial-gradient(at 100% 100%, var(--pastel-lavender) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* App Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: var(--nav-height);
            padding-bottom: var(--bottom-nav-height);
        }

        /* Top Navigation */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .top-nav h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-icon-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--primary);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .nav-icon-btn:hover {
            background: var(--primary-light);
        }

        .badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: var(--danger);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 99px;
            display: none;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        /* Caregiver Profile Card */
        .profile-section {
            margin-bottom: 24px;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 0;
        }

        .profile-avatar-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid white;
            box-shadow: var(--shadow-sm);
        }

        .profile-avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 2px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .role-badge {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            background: white;
            padding: 4px 0;
            border-radius: 99px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid transparent;
        }

        .stat-card i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .stat-card.urgent {
            background: #fffbeb;
            border: 1px solid #fde68a;
        }

        .stat-card.urgent i {
            color: var(--warning);
        }

        .stat-data h3 {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1;
        }

        .stat-data p {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        /* Elders Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .section-header h3 {
            font-size: 1.25rem;
            font-weight: 800;
        }

        .see-all {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .elder-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .elder-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid var(--border-light);
        }

        .elder-card:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
        }

        .elder-avatar-wrap {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            overflow: hidden;
            background: var(--primary-light);
        }

        .elder-avatar-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .elder-main h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .elder-main p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .risk-area {
            text-align: right;
        }

        .risk-score {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 4px;
        }

        .risk-score span {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .risk-label {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .risk-bar-container {
            grid-column: 1 / 4;
            margin-top: 8px;
        }

        .risk-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .risk-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .view-record-btn {
            grid-column: 1 / 4;
            margin-top: 16px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .view-record-btn:hover {
            background: var(--accent);
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--bottom-nav-height);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
            min-width: 70px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item span {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.02em;
        }

        /* Notification Panel */
        .notification-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: white;
            z-index: 2000;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.1);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .notification-panel.open {
            right: 0;
        }

        .panel-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header h3 {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .notification-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .notification-item {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-radius: 24px;
            background: white;
            margin-bottom: 16px;
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid transparent;
            border-left: 6px solid #1e3a8a;
            transition: all 0.2s ease;
        }

        .notification-item:hover {
            transform: translateX(4px);
            border-color: rgba(30, 58, 138, 0.1);
        }

        .notif-icon-wrap {
            width: 52px;
            height: 52px;
            background: #EFF6FF;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #1e3a8a;
            flex-shrink: 0;
        }

        .notif-main {
            flex: 1;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .notif-type {
            font-size: 0.72rem;
            font-weight: 800;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .notif-time {
            font-size: 0.72rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .notif-body {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .notif-actions {
            display: flex;
            gap: 10px;
        }

        .notif-btn {
            padding: 8px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .notif-btn.primary {
            background: #1e3a8a;
            color: white;
        }

        .notif-btn.secondary {
            background: #f1f5f9;
            color: #475569;
        }

        .notif-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .notif-delete {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            color: #94a3b8;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .notif-delete:hover {
            background: #fee2e2;
            color: #ef4444;
            border-color: #fecaca;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            border-radius: 999px;
            width: 0%;
            transition: width 0.3s ease;
            animation: progressPulse 1.2s ease-in-out infinite alternate;
        }

        @keyframes progressPulse {
            from {
                opacity: 0.7;
            }

            to {
                opacity: 1;
            }
        }

        /* ---- Per-report highlight ---- */
        .report-card.selected {
            border-color: var(--accent);
            background: rgba(74, 144, 226, 0.06);
            box-shadow: 0 4px 14px rgba(74, 144, 226, 0.12);
        }

        .report-card .report-select-indicator {
            display: inline-block;
            background: var(--accent);
            color: white;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-left: 8px;
            vertical-align: middle;
            display: none;
        }

        .report-card.selected .report-select-indicator {
            display: inline-block;
        }

        /* ---- Toast Notification ---- */
        #uploadToast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: white;
            border: 1px solid rgba(74, 144, 226, 0.25);
            border-radius: 18px;
            padding: 16px 22px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            z-index: 9999;
            transform: translateY(120px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #uploadToast.show {
            transform: translateY(0);
            opacity: 1;
        }

        #uploadToast.success .toast-icon {
            color: var(--success);
        }

        #uploadToast.error .toast-icon {
            color: var(--danger);
        }

        .toast-icon {
            font-size: 1.2rem;
        }

        /* ---- Mind Map Optimization ---- */
        #medicalInsightsContainer {
            position: relative;
            padding: 20px 0;
            overflow: visible;
        }

        .mind-map-spine {
            position: absolute;
            top: 60px;
            bottom: 40px;
            left: 50%;
            width: 2px;
            background: linear-gradient(to bottom, var(--accent), var(--accent-2), transparent);
            transform: translateX(-50%);
            opacity: 0.3;
            z-index: 0;
        }

        .mind-map-hub {
            width: 64px;
            height: 64px;
            background: white;
            border: 3px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.4);
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% {
                box-shadow: 0 0 0px rgba(74, 144, 226, 0.4);
            }

            50% {
                box-shadow: 0 0 25px rgba(74, 144, 226, 0.6);
            }

            100% {
                box-shadow: 0 0 0px rgba(74, 144, 226, 0.4);
            }
        }

        .insight-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .insight-card {
            background: white;
            border: 1px solid rgba(74, 144, 226, 0.1);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            position: relative;
            animation: slideUp 0.6s ease backwards;
        }

        /* Connecting arms */
        .insight-card::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 15px;
            height: 2px;
            background: var(--accent);
            opacity: 0.3;
        }

        /* Alternating sides for spine connectivity */
        .insight-card:nth-child(odd) {
            margin-right: 15px;
        }

        .insight-card:nth-child(odd)::after {
            right: -15px;
        }

        .insight-card:nth-child(even) {
            margin-left: 15px;
        }

        .insight-card:nth-child(even)::after {
            left: -15px;
        }

        .insight-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 32px rgba(74, 144, 226, 0.15);
            border-color: rgba(74, 144, 226, 0.3);
            z-index: 5;
        }

        .insight-content ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 0 0;
        }

        .insight-content li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
        }

        .insight-content li::before {
            content: "ðŸ‘‰";
            position: absolute;
            left: 0;
            font-size: 0.8rem;
            filter: grayscale(1);
            opacity: 0.6;
        }

        @media (max-width: 1200px) {
            .insight-grid {
                grid-template-columns: 1fr;
            }

            .mind-map-spine {
                left: 24px;
                left: 24px;
                transform: none;
            }

            .insight-card {
                margin-left: 45px !important;
                margin-right: 0 !important;
            }

            .insight-card::after {
                left: -21px !important;
                width: 21px;
            }

            .mind-map-hub {
                margin-left: 0;
            }
        }

        /* Spinner Component */
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 144, 226, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Environmental Dashboard Section */
        .env-dashboard {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.04), rgba(30, 144, 255, 0.01));
            border: 1px solid rgba(30, 144, 255, 0.12);
            border-radius: 20px;
            padding: 20px;
            margin-top: 16px;
            animation: slideUp 0.6s ease 0.2s backwards;
        }

        .env-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 16px;
        }

        .env-stat {
            background: white;
            padding: 16px 12px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s ease;
        }

        .env-stat:hover {
            transform: translateY(-3px);
            border-color: rgba(30, 144, 255, 0.3);
        }

        .env-stat label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 0.04em;
        }

        .env-stat span {
            font-size: 1.1rem;
            font-weight: 800;
            color: #1e90ff;
        }

        @media (max-width: 1080px) {
            .app-shell {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .recipient-list {
                max-height: none;
            }
        }

        /* Vitals Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: fadeIn 0.3s ease;
        }

        .modal-card {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .modal-header h3 {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--muted);
            cursor: pointer;
            padding: 4px;
        }

        .vitals-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .form-group input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .modal-footer {
            margin-top: 32px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {

    <script>
        const API_BASE = 'http://127.0.0.1:8000/api';
        const EMOTION_API_BASE = API_BASE + '/emotion';
        const token = localStorage.getItem('token');

        if (!token) {
            window.location.href = 'index.html';
        }

        const clearReportSelectBtn = document.getElementById('clearReportSelectBtn');
        if (clearReportSelectBtn) {
            clearReportSelectBtn.addEventListener('click', () => clearReportSelection());
        }

        const caretakerNameEl = document.getElementById('caretakerName');
        const caretakerFullEl = document.getElementById('caretakerFullName');
        const caretakerEmailEl = document.getElementById('caretakerEmail');
        const caretakerPhoneEl = document.getElementById('caretakerPhone');
        const sidebarNameEl = document.getElementById('sidebarCaretakerName');
        const sidebarEmailEl = document.getElementById('sidebarCaretakerEmail');
        const recipientsListEl = document.getElementById('recipientsList');
        const recipientSearchEl = document.getElementById('recipientSearch');
        const recipientTitleEl = document.getElementById('recipientCardTitle');
        const recipientMetaEl = document.getElementById('recipientCardMeta');
        const recipientBadgesEl = document.getElementById('recipientBadges');
        const selectedRecipientEl = document.getElementById('selectedRecipient');
        const historyRecipientEl = document.getElementById('historyRecipient');
        const refreshHistoryBtn = document.getElementById('refreshHistory');
        const medicalSummaryEl = document.getElementById('medicalSummaryText');
        const summaryStatusEl = document.getElementById('summaryStatus');
        const reportsListEl = document.getElementById('reportsList');
        const refreshReportsBtn = document.getElementById('refreshReports');
        const regenerateSummaryBtn = document.getElementById('regenerateSummary');
        const reportSortOrderSelect = document.getElementById('reportSortOrder');
        const profileLinkEl = document.getElementById('profileLink');

        let currentRecipientReports = [];

        // Video monitoring DOM refs
        const startEmotionMonitorBtn = document.getElementById('startEmotionMonitorBtn');
        const emotionStatusEl = document.getElementById('emotionStatus');
        const emotionVideoEl = document.getElementById('emotionVideo');
        const emotionCurrentEl = document.getElementById('emotionCurrent');
        const emotionConfidenceEl = document.getElementById('emotionConfidence');

        let recipientsCache = [];
        let selectedRecipientId = null;
        let selectedRecipientName = 'All';
        let sessionPredictions = [];
        let summaryGenerating = false;
        let reportsRefreshing = false;

        // Video monitoring state
        let emotionMonitoringActive = false;
        let emotionStream = null;
        let emotionCaptureInterval = null;

        document.querySelectorAll('.nav-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const targetId = chip.getAttribute('data-target');
                const section = document.getElementById(targetId);
                if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            });
        });

        // Add event listeners only if elements exist
        if (refreshHistoryBtn) {
            refreshHistoryBtn.addEventListener('click', () => fetchAndRenderRecordings());
        }
        if (refreshReportsBtn) {
            refreshReportsBtn.addEventListener('click', () => fetchRecipientReports());
        }
        if (regenerateSummaryBtn) {
            regenerateSummaryBtn.addEventListener('click', () => handleRegenerateSummary());
        }

        recipientSearchEl.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = recipientsCache.filter(r => (r.full_name || '').toLowerCase().includes(term));
            renderRecipients(filtered);
        });

        function toggleNotifications() {
            const panel = document.getElementById('notificationPanel');
            const overlay = document.getElementById('panelOverlay');
            if (panel && overlay) {
                panel.classList.toggle('open');
                overlay.classList.toggle('show');
            }
        }

        async function fetchProfile() {
            try {
                const res = await fetch(API_BASE + '/profile', {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                    return;
                }
                if (!res.ok) throw new Error('Failed to fetch profile');
                const data = await res.json();
                if (!data || !data.caretaker) return;

                const caretaker = data.caretaker;
                const name = caretaker.full_name || caretaker.username;

                // Update Profile Hub Card
                const hubName = document.getElementById('caretakerDisplayName');
                const hubEmail = document.getElementById('caretakerDisplayEmail');
                const hubAvatar = document.getElementById('profileAvatar');
                if (hubName) hubName.textContent = name;
                if (hubEmail) hubEmail.textContent = caretaker.email || '---';
                if (hubAvatar) hubAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=1e3a8a&color=fff&size=140`;

                recipientsCache = data.care_recipients || [];
                renderRecipients(recipientsCache);
                updateNotificationCenter(recipientsCache);

                // Update Stats
                const eldersCountStats = document.getElementById('eldersCountStats');
                if (eldersCountStats) eldersCountStats.textContent = recipientsCache.length;

                // Auto-select first recipient for background tasks if needed
                if (recipientsCache.length > 0 && !selectedRecipientId) {
                    selectedRecipientId = recipientsCache[0].id;
                }
            } catch (err) {
                console.error('Error fetching profile', err);
            }
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return `${minutes}m ago`;
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return `${hours}h ago`;
            const days = Math.floor(hours / 24);
            return `${days}d ago`;
        }

        function updateNotificationCenter(recipients) {
            const listEl = document.getElementById('notificationList');
            const badge = document.getElementById('notificationBadge');
            const actionCountEl = document.getElementById('actionsNeededCount');

            if (!listEl) return;

            let allNotifications = [];
            let totalUnread = 0;

            recipients.forEach(r => {
                // Add Clinical Alerts
                if (r.alerts && r.alerts.length > 0) {
                    r.alerts.forEach(a => {
                        allNotifications.push({
                            type: 'alert',
                            title: a.severity === 'critical' ? 'CRITICAL RISK' : 'HEALTH ALERT',
                            recipientName: r.full_name,
                            recipientId: r.id,
                            id: a.id,
                            message: a.message,
                            severity: a.severity,
                            time: new Date(a.created_at)
                        });
                        totalUnread++;
                    });
                }

                // Add Medication Reminders (Triggered by schedule)
                if (r.medications && r.medications.length > 0) {
                    const dismissedMeds = JSON.parse(sessionStorage.getItem('dismissedMeds') || '[]');
                    r.medications.forEach(m => {
                        if (m.schedule_time) {
                            const times = m.schedule_time.split(',').map(s => s.trim());
                            times.forEach(t => {
                                const [hh, mm] = t.split(':');
                                const medTime = new Date();
                                medTime.setHours(parseInt(hh), parseInt(mm), 0, 0);

                                const medId = `med-${m.id || m.medication_id}-${t}`;
                                if (dismissedMeds.includes(medId)) return;

                                // Logic: Only show if time has passed today, OR if it's coming up within 30 mins
                                const diffMins = (new Date() - medTime) / 60000;
                                
                                // Show alerts for meds taken in the last 4 hours or due in the next 0 mins
                                if (diffMins >= 0 && diffMins < 240) {
                                    allNotifications.push({
                                        type: 'med',
                                        title: 'MEDICINE DUE',
                                        recipientName: r.full_name,
                                        recipientId: r.id,
                                        id: medId,
                                        message: `It's time for ${m.medicine_name}${m.dosage ? ' (' + m.dosage + ')' : ''}.`,
                                        time: medTime
                                    });
                                    totalUnread++;
                                }
                            });
                        }
                    });
                }
            });

            // Sort by time (newest first)
            allNotifications.sort((a, b) => b.time - a.time);

            if (allNotifications.length === 0) {
                listEl.innerHTML = '<div class="muted" style="text-align: center; padding: 40px;">No new notifications.</div>';
            } else {
                listEl.innerHTML = allNotifications.map(n => {
                    const icon = n.type === 'alert' ? 'fa-exclamation-triangle' : 'fa-pills';
                    const timeLabel = timeAgo(n.time);
                    
                    return `
                        <div class="notification-item">
                            <button class="btn btn-icon btn-sm" style="position: absolute; top: 12px; right: 12px; color: #94a3b8;" onclick="dismissLocalNotif('${n.id}', ${n.recipientId}, '${n.type}')">
                                <i class="fas fa-times"></i>
                            </button>
                            <div class="notif-icon-wrap">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="notif-main">

        /**
         * Robust Mind Map Parsing Engine
         * Divides text into sections using strict header detection and point-based splitting.
         */
        function renderFormattedInsights(text, containerId, showEnv = true) {
            const container = document.getElementById(containerId);
            if (!container) return;

            container.innerHTML = '';

            // Add Visualization Infrastructure
            const spine = document.createElement('div');
            spine.className = 'mind-map-spine';
            container.appendChild(spine);

            const hub = document.createElement('div');
            hub.className = 'mind-map-hub';
            hub.innerHTML = '<span style="font-size:1.5rem;">ðŸ§ </span>';
            container.appendChild(hub);

            const grid = document.createElement('div');
            grid.className = 'insight-grid';

            const sections = [];
            const lines = text.split('\n');
            let currentSection = null;
            let envData = { temp: '', hum: '', aqi: '' };
            let hasEnvData = false;

            const clinicalHeaders = [
                'DIAGNOSES', 'DIAGNOSIS', 'SYMPTOMS', 'SYMPTOM', 'VITALS', 'VITAL', 'MEDICATIONS', 'MEDICATION', 'MEDS',
                'CARE PLAN', 'FOLLOW-UP', 'ADVICE', 'LABS', 'LAB', 'HISTORY', 'TIMELINE', 'TRENDS', 'PLAN', 'MANAGEMENT'
            ];

            lines.forEach(line => {
                // Pre-process: Strip bold, trim, remove markers
                let trimmed = line.trim().replace(/\*\*/g, '').replace(/^###\s+/, '');
                if (!trimmed || trimmed.includes('START_') || trimmed.includes('END_') || trimmed.toUpperCase().includes('CLINICAL SUMMARY')) return;

                // 1. Environmental Threshold Detection
                if (trimmed.includes('Temperature Range') || (trimmed.toLowerCase().includes('recommended') && trimmed.toLowerCase().includes('temperature'))) {
                    envData.temp = trimmed.split(':', 2)[1]?.trim() || trimmed;
                    hasEnvData = true;
                    return;
                }
                if (trimmed.includes('Humidity Range') || (trimmed.toLowerCase().includes('recommended') && trimmed.toLowerCase().includes('humidity'))) {
                    envData.hum = trimmed.split(':', 2)[1]?.trim() || trimmed;
                    hasEnvData = true;
                    return;
                }
                if (trimmed.includes('Air Quality') || (trimmed.toLowerCase().includes('recommended') && trimmed.toLowerCase().includes('air quality'))) {
                    envData.aqi = trimmed.split(':', 2)[1]?.trim() || trimmed;
                    hasEnvData = true;
                    return;
                }

                // 2. Section Header Detection
                // Supports bullets: â€¢, âˆ™, Â·, *, + OR keywords followed by colons
                const hasBullet = /^[â€¢âˆ™Â·\*\+]\s*/.test(trimmed);
                const hasKeyword = clinicalHeaders.some(h => trimmed.toUpperCase().includes(h));
                const isHeader = (hasBullet && trimmed.includes(':')) || (trimmed.includes(':') && hasKeyword && !trimmed.startsWith('-'));

                if (isHeader) {
                    const cleanHeader = trimmed.replace(/^[â€¢âˆ™Â·\*\+]\s*/, '').trim();
                    const colonIdx = cleanHeader.indexOf(':');
                    const title = cleanHeader.substring(0, colonIdx).trim();
                    const remainder = cleanHeader.substring(colonIdx + 1).trim();

                    if (title.length > 2 && title.length < 40) {
                        currentSection = {
                            title: title,
                            points: remainder ? [remainder] : [],
                            type: title.toLowerCase()
                        };
                        sections.push(currentSection);
                        return;
                    }
                }

                // 3. Point Capture
                if (currentSection) {
                    const point = trimmed.replace(/^[â€¢âˆ™Â·\*\+\-]\s*/, '').trim();
                    if (point && !point.toUpperCase().includes('ENVIRONMENTAL RECOMMENDATIONS')) {
                        // Avoid duplicates of the title itself
                        if (point !== currentSection.title && !point.startsWith(currentSection.title + ':')) {
                            currentSection.points.push(point);
                        }
                    }
                }
            });

            // 4. Render Category Cards
            if (sections.length > 0) {
                sections.forEach(sec => {
                    const rawPoints = Array.from(new Set(sec.points.filter(p => p.length > 1)));
                    if (!rawPoints.length) return;

                    const card = document.createElement('div');
                    let typeClass = 'careplan';
                    let icon = 'ðŸ“';

                    const titleLower = sec.title.toLowerCase();
                    if (titleLower.includes('diagnos')) { typeClass = 'diagnoses'; icon = 'ðŸ¥'; }
                    else if (titleLower.includes('symptom') || titleLower.includes('history')) { typeClass = 'symptoms'; icon = 'ðŸ¤’'; }
                    else if (titleLower.includes('vital') || titleLower.includes('lab')) { typeClass = 'vitals'; icon = 'ðŸ“Š'; }
                    else if (titleLower.includes('medication')) { typeClass = 'meds'; icon = 'ðŸ’Š'; }
                    else if (titleLower.includes('plan') || titleLower.includes('advice')) { typeClass = 'careplan'; icon = 'ðŸ“‹'; }

                    let processedPoints = [];
                    rawPoints.forEach(p => {
                        if (p.includes(';')) {
                            p.split(';').forEach(s => { if (s.trim()) processedPoints.push(s.trim()); });
                        } else if (p.length > 65 && p.includes('. ')) {
                            p.split(/\.\s+/).forEach(s => { if (s.trim()) processedPoints.push(s.trim()); });
                        } else {
                            processedPoints.push(p);
                        }
                    });

                    card.className = `insight-card ${typeClass}`;
                    card.innerHTML = `
                        <div class="insight-header"><div class="insight-icon">${icon}</div>${sec.title}</div>
                        <div class="insight-content"><ul>${processedPoints.map(p => `<li>${p}</li>`).join('')}</ul></div>
                    `;
                    grid.appendChild(card);
                });
            } else if (text && text.length > 10) {
                // Fallback for unstructured text (e.g., Gemini didn't use headers or returned an error message)
                const fallbackCard = document.createElement('div');
                fallbackCard.className = 'insight-card careplan';
                fallbackCard.style.gridColumn = '1 / -1';
                fallbackCard.innerHTML = `
                    <div class="insight-header"><div class="insight-icon">â„¹ï¸</div>Clinical Summary</div>
                    <div class="insight-content" style="white-space: pre-line; line-height: 1.6;">${text}</div>
                `;
                grid.appendChild(fallbackCard);
            }

            container.appendChild(grid);

            // 5. Render Environmental Monitoring dashboard - Only if enabled
            if (showEnv && hasEnvData) {
                const envDash = document.createElement('div');
                envDash.className = 'env-dashboard';
                envDash.style.zIndex = "2";
                envDash.style.position = "relative";
                envDash.innerHTML = `
                    <div class="insight-header"><div class="insight-icon">ðŸ </div>Optimized Health Environment</div>
                    <div class="env-items">
                        <div class="env-stat"><label>Temperature</label><span>${envData.temp}</span></div>
                        <div class="env-stat"><label>Humidity</label><span>${envData.hum}</span></div>
                        <div class="env-stat"><label>Air Quality</label><span>${envData.aqi}</span></div>
                    </div>
                `;
                container.appendChild(envDash);
            }
        }

        function parseSummaryText(text) {
            // Helper to create a section
            const createSection = (title, icon, content) => {
                return `
                    <div class="summary-section">
                        <div class="summary-section-header">
                            <i class="${icon}"></i>
                            <h4>${title}</h4>
                        </div>
                        <div class="summary-content">${content}</div>
                    </div>
                `;
            };

            // Parse sections
            // Extract recommendations (numbered 1-3)
            let recommendations = '';
            const recMatch = text.match(/(\d+\.\s*Recommended[\s\S]*?)(?=\n\n|$)/);
            let summaryText = text;

            if (recMatch) {
                const recText = recMatch[1];
                const lines = recText.split('\n');
                let temp = '-', hum = '-', aqi = '-';
                lines.forEach(line => {
                    const lowerLine = line.toLowerCase();
                    if (lowerLine.includes('temperature')) temp = line.split(':')[1]?.trim() || line.split(')').pop().trim();
                    if (lowerLine.includes('humidity')) hum = line.split(':')[1]?.trim() || line.split(')').pop().trim();
                    if (lowerLine.includes('air quality')) aqi = line.split(':')[1]?.trim() || line.split(')').pop().trim();
                });
                recommendations = `
                    <div class="summary-thresholds">
                        <div class="threshold-pill">
                            <i class="fas fa-thermometer-half"></i>
                            <span class="label">Temperature</span>
                            <span class="value">${temp}</span>
                        </div>
                        <div class="threshold-pill">
                            <i class="fas fa-tint"></i>
                            <span class="label">Humidity</span>
                            <span class="value">${hum}</span>
                        </div>
                        <div class="threshold-pill">
                            <i class="fas fa-wind"></i>
                            <span class="label">Air Quality</span>
                            <span class="value">${aqi}</span>
                        </div>
                    </div>
                `;
                summaryText = text.replace(recText, '').trim();
            }

            // Split into sections using bullet points or headings
            const sectionMap = [
                { key: 'Diagnoses', icon: 'fas fa-stethoscope', title: 'Diagnoses' },
                { key: 'Symptoms / Complaints', icon: 'fas fa-user-md', title: 'Symptoms' },
                { key: 'Important Vitals', icon: 'fas fa-heartbeat', title: 'Key Vitals' },
                { key: 'Medications', icon: 'fas fa-pills', title: 'Medications' },
                { key: 'Follow-up Advice', icon: 'fas fa-clipboard-check', title: 'Follow-up' }
            ];

            let html = '<div class="summary-container">';

            // Collect all indices and matched sections
            const matchedSections = [];
            sectionMap.forEach(s => {
                const index = summaryText.indexOf(s.key);
                if (index !== -1) {
                    matchedSections.push({ ...s, index });
                }
            });

            // Sort sections by their position in text
            matchedSections.sort((a, b) => a.index - b.index);

            matchedSections.forEach((s, i) => {
                const start = s.index + s.key.length + 1; // +1 for colon
                const end = i < matchedSections.length - 1 ? matchedSections[i + 1].index : summaryText.length;
                let content = summaryText.substring(start, end).trim();

                if (content) {
                    // Extract bullet points
                    const lines = content.split('\n')
                        .map(l => l.trim().replace(/^[\-\â€¢\*\s]+/g, ''))
                        .filter(l => l && !l.startsWith('Based on the')); // Filter out the transition sentence

                    if (lines.length > 0) {
                        const listHtml = `<ul class="summary-ul">${lines.map(l => `<li>${l}</li>`).join('')}</ul>`;
                        html += createSection(s.title, s.icon, listHtml);
                    }
                }
            });

            if (recommendations) {
                html += `
                    <div class="summary-section full-width" style="border-top: 2px solid var(--accent);">
                        <div class="summary-section-header">
                            <i class="fas fa-leaf"></i>
                            <h4>Care Environment</h4>
                        </div>
                        <p style="font-size: 0.8rem; color: var(--muted); margin-bottom: 12px;">AI-generated recommendations based on clinical diagnosis.</p>
                        ${recommendations}
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        async function fetchRecipientReports() {
            const recipient = getSelectedRecipient();
            if (!recipient) {
                if (reportsListEl) reportsListEl.innerHTML = '<p class="muted">Select a care recipient to list their medical reports.</p>';
                reportsRefreshing = false;
                updateReportControlsState();
                return;
            }
            reportsRefreshing = true;
            updateReportControlsState();
            if (reportsListEl) reportsListEl.innerHTML = '<p class="muted">Loading reports...</p>';
            try {
                const res = await fetch(`${API_BASE}/recipients/${recipient.id}/reports`, {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (!res.ok) throw new Error('Failed to list reports');
                const payload = await res.json();
                currentRecipientReports = payload?.result?.reports || [];
                sortAndRenderReports();
            } catch (err) {
                console.error('Error fetching medical reports', err);
                if (reportsListEl) reportsListEl.innerHTML = '<p class="muted">Unable to load reports.</p>';
            } finally {
                reportsRefreshing = false;
                updateReportControlsState();
            }
        }

        let selectedReportId = null;

        function sortAndRenderReports() {
            const recipient = getSelectedRecipient();
            if (!recipient) return;

            const sortVal = reportSortOrderSelect ? reportSortOrderSelect.value : 'date_desc';
            const sorted = [...currentRecipientReports].sort((a, b) => {
                if (sortVal === 'date_desc') return new Date(b.uploaded_at) - new Date(a.uploaded_at);
                if (sortVal === 'date_asc') return new Date(a.uploaded_at) - new Date(b.uploaded_at);
                if (sortVal === 'name_asc') return a.filename.localeCompare(b.filename);
                if (sortVal === 'name_desc') return b.filename.localeCompare(a.filename);
                return 0;
            });

            renderReportsList(recipient.id, sorted);
        }

        if (reportSortOrderSelect) {
            reportSortOrderSelect.addEventListener('change', () => sortAndRenderReports());
        }

                showToast('Failed to delete report', 'error');

        // ---- Audio monitoring logic (adapted from dashboard) ----
        let audioContext, analyser, dataArray;
        let recognitionActive = false;
        let audioStream = null;
        let processorNode = null;
        let silentGainNode = null;
        let pcmBuffer = [];
        let pcmBufferLength = 0;
        const PCM_BUFFER_SECONDS = 6;
        const MIN_RECORDING_DURATION = 4000;
        let coughDetectionActive = false;
        let coughStartTime = null;
        let coughRecordingTimeout = null;
        let coughCount = 0;
        let snoreDetectionActive = false;
        let snoreStartTime = null;
        let snoreRecordingTimeout = null;
        let snoreCount = 0;
        const AUTO_DOWNLOAD = false;
        const startBtn = document.getElementById('startBtn');
        const statusEl = document.getElementById('status');
        const labelContainer = document.getElementById('label-container');

        if (startBtn) {
            startBtn.addEventListener('click', toggleRecording);
        }

        async function toggleRecording() {
            if (!recognitionActive) {
                await initRecognizer();
                startBtn.textContent = 'Stop Listening';
                recognitionActive = true;
            } else {
                stopRecording();
                startBtn.textContent = 'Start Listening';
                recognitionActive = false;
            }
        }

        async function initRecognizer() {
            const MODEL_BASE = API_BASE + '/model';
            const recognizer = speechCommands.create('BROWSER_FFT', undefined, MODEL_BASE + '/model.json', MODEL_BASE + '/metadata.json');
            try {
                await recognizer.ensureModelLoaded();
                labelContainer.innerHTML = '';
                const labels = recognizer.wordLabels();
                labels.forEach(() => labelContainer.appendChild(document.createElement('div')));

                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 44100 } });
                const source = audioContext.createMediaStreamSource(audioStream);
                startContinuousRecording(source);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 2048;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                source.connect(analyser);
                drawWaveform();

                const labelMap = {};
                labels.forEach((label, index) => {
                    labelMap[label.toLowerCase()] = index;
                });

                const coughIndex = labelMap['cough'] !== undefined ? labelMap['cough'] : -1;
                const snoreIndex = labelMap['snore'] !== undefined ? labelMap['snore'] : -1;
                const detectionThreshold = 0.65;

                recognizer.listen(result => {
                    const scores = result.scores;
                    scores.forEach((score, i) => {
                        if (labelContainer.childNodes[i]) {
                            labelContainer.childNodes[i].textContent = `${labels[i]}: ${score.toFixed(2)}`;
                        }
                    });

                    const coughScore = coughIndex >= 0 ? scores[coughIndex] : 0;
                    const snoreScore = snoreIndex >= 0 ? scores[snoreIndex] : 0;

                    if (!coughDetectionActive && !snoreDetectionActive) {
                        statusEl.textContent = `Listeningâ€¦ (Cough: ${coughScore.toFixed(2)} | Snore: ${snoreScore.toFixed(2)})`;
                        statusEl.style.color = '#38bdf8';
                    }

                    if (coughScore >= detectionThreshold) {
                        addSessionPrediction({
                            type: 'cough',
                            score: coughScore,
                            timestamp: Date.now(),
                            recipient_id: selectedRecipientId,
                            recipient_name: selectedRecipientName
                        });

                        if (!coughDetectionActive) {
                            coughDetectionActive = true;
                            coughStartTime = Date.now();
                            coughCount++;
                            document.getElementById('coughCount').textContent = coughCount;
                            statusEl.textContent = `ðŸš¨ Cough #${coughCount} detected! (${coughScore.toFixed(2)}) - Recordingâ€¦`;
                            statusEl.style.color = '#fb7185';
                            if (coughRecordingTimeout) clearTimeout(coughRecordingTimeout);
                            coughRecordingTimeout = setTimeout(() => saveDetectionRecording('cough', coughScore), MIN_RECORDING_DURATION);
                        } else {
                            const elapsed = Date.now() - coughStartTime;
                            if (elapsed < MIN_RECORDING_DURATION) {
                                if (coughRecordingTimeout) clearTimeout(coughRecordingTimeout);
                                coughRecordingTimeout = setTimeout(
                                    () => saveDetectionRecording('cough', coughScore),
                                    MIN_RECORDING_DURATION - elapsed
                                );
                            }
                        }
                    }

                    if (snoreScore >= detectionThreshold) {
                        addSessionPrediction({
                            type: 'snore',
                            score: snoreScore,
                            timestamp: Date.now(),
                            recipient_id: selectedRecipientId,
                            recipient_name: selectedRecipientName
                        });

                        if (!snoreDetectionActive) {
                            snoreDetectionActive = true;
                            snoreStartTime = Date.now();
                            snoreCount++;
                            document.getElementById('snoreCount').textContent = snoreCount;
                            statusEl.textContent = `ðŸ˜´ Snore #${snoreCount} detected! (${snoreScore.toFixed(2)}) - Recordingâ€¦`;
                            statusEl.style.color = '#a78bfa';
                            if (snoreRecordingTimeout) clearTimeout(snoreRecordingTimeout);
                            snoreRecordingTimeout = setTimeout(() => saveDetectionRecording('snore', snoreScore), MIN_RECORDING_DURATION);
                        } else {
                            const elapsed = Date.now() - snoreStartTime;
                            if (elapsed < MIN_RECORDING_DURATION) {
                                if (snoreRecordingTimeout) clearTimeout(snoreRecordingTimeout);
                                snoreRecordingTimeout = setTimeout(
                                    () => saveDetectionRecording('snore', snoreScore),
                                    MIN_RECORDING_DURATION - elapsed
                                );
                            }
                        }
                    }
                }, {
                    includeSpectrogram: true,
                    overlapFactor: 0.5,
                    invokeCallbackOnNoiseAndUnknown: true,
                    probabilityThreshold: 0.5
                });

                statusEl.textContent = 'Listening for coughs and snoresâ€¦';
            } catch (err) {
                console.error('Error init audio:', err);
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.style.color = '#fb7185';
            }
        }

        function startContinuousRecording(source) {
            pcmBuffer = [];
            pcmBufferLength = 0;
            const bufferSize = 4096;
            const channelCount = source.channelCount || 1;
            const maxSamples = audioContext.sampleRate * PCM_BUFFER_SECONDS;

            processorNode = audioContext.createScriptProcessor(bufferSize, channelCount, channelCount);
            processorNode.onaudioprocess = (event) => {
                const inputBuffer = event.inputBuffer;
                const chunkChannels = [];
                for (let ch = 0; ch < inputBuffer.numberOfChannels; ch++) {
                    const channelData = new Float32Array(inputBuffer.length);
                    channelData.set(inputBuffer.getChannelData(ch));
                    chunkChannels.push(channelData);
                }
                pcmBuffer.push({ channels: chunkChannels, length: inputBuffer.length });
                pcmBufferLength += inputBuffer.length;

                while (pcmBufferLength > maxSamples && pcmBuffer.length > 0) {
                    const removed = pcmBuffer.shift();
                    pcmBufferLength -= removed.length;
                }
            };

            silentGainNode = audioContext.createGain();
            silentGainNode.gain.value = 0;
            source.connect(processorNode);
            processorNode.connect(silentGainNode);
            silentGainNode.connect(audioContext.destination);
        }

        async function saveDetectionRecording(type, score) {
            if (!pcmBuffer.length) return;

            const wavBlob = encodeWAV(pcmBuffer, 1, audioContext.sampleRate);
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            const filename = `${type}_${type === 'cough' ? coughCount : snoreCount}_${timestamp}.wav`;

            // Upload to server
            const formData = new FormData();
            formData.append('file', wavBlob, filename);
            formData.append('type', type);
            formData.append('score', score);
            if (selectedRecipientId) {
                formData.append('care_recipient_id', selectedRecipientId);
            }

            try {
                const response = await fetch(`${API_BASE}/recordings/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Failed to upload recording');
                }

                const data = await response.json();
                console.log(`${type} recording saved:`, data);

                // Update UI
                const url = URL.createObjectURL(wavBlob);
                showRecording(filename, url);

            } catch (error) {
                console.error(`Error saving ${type} recording:`, error);
            } finally {
                // Reset state for the specific type
                if (type === 'cough') {
                    coughDetectionActive = false;
                } else if (type === 'snore') {
                    snoreDetectionActive = false;
                }

                // Only clear buffers if neither detection is active
                if (!coughDetectionActive && !snoreDetectionActive) {
                    pcmBuffer = [];
                    pcmBufferLength = 0;
                    statusEl.textContent = 'Listeningâ€¦';
                    statusEl.style.color = '#38bdf8';
                }
            }
        }

        function startWaveAnimation() {
            drawWaveform();
        }

        function drawWaveform() {
            requestAnimationFrame(drawWaveform);
            const canvas = document.getElementById('waveCanvas');
            const ctx = canvas.getContext('2d');
            if (!analyser) return;
            analyser.getByteTimeDomainData(dataArray);
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#38bdf8';
            ctx.beginPath();
            const sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
                const v = dataArray[i] / 128.0;
                const y = v * canvas.height / 2;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function stopRecording() {
            if (processorNode) { processorNode.disconnect(); processorNode.onaudioprocess = null; processorNode = null; }
            if (silentGainNode) { silentGainNode.disconnect(); silentGainNode = null; }
            if (coughRecordingTimeout) clearTimeout(coughRecordingTimeout);
            if (snoreRecordingTimeout) clearTimeout(snoreRecordingTimeout);
            if (audioStream) audioStream.getTracks().forEach(track => track.stop());
            if (audioContext && audioContext.state !== 'closed') audioContext.close();
            pcmBuffer = [];
            pcmBufferLength = 0;
            coughDetectionActive = false;
            snoreDetectionActive = false;
            statusEl.textContent = 'Stopped';
            statusEl.style.color = '#fb7185';
        }

        function addSessionPrediction(pred) {
            const emoji = pred.type === 'cough' ? 'ðŸ¤§' : pred.type === 'snore' ? 'ðŸ˜´' : 'ðŸ”Š';
            pred.displayText = `${emoji} ${(pred.score * 100).toFixed(0)}% ${pred.type}${pred.recipient_name ? ` (${pred.recipient_name})` : ''}`;

            sessionPredictions.unshift(pred);

        function renderSessionPredictions() {
            const el = document.getElementById('sessionPredictions');
            el.innerHTML = '';
            if (!sessionPredictions.length) {
                el.innerHTML = '<p class="muted">No predictions yet in this session.</p>';
                return;
            }

            const groupedPredictions = {
                cough: [],
                snore: [],
                other: []
            };

            sessionPredictions.slice(0, 100).forEach(pred => {
                const type = pred.type || 'other';
                if (groupedPredictions[type] !== undefined) {
                    groupedPredictions[type].push(pred);
                } else {
                    groupedPredictions.other.push(pred);
                }
            });

            const sections = [
                { type: 'cough', title: '😷 Coughs', predictions: groupedPredictions.cough },
                { type: 'snore', title: '😴 Snores', predictions: groupedPredictions.snore },
                { type: 'other', title: '🔊 Other Sounds', predictions: groupedPredictions.other }
            ];

            sections.forEach(section => {
                if (section.predictions.length === 0) return;

                const sectionEl = document.createElement('div');
                sectionEl.className = 'prediction-section';
                sectionEl.innerHTML = `<h4 style="margin: 16px 0 8px; color: var(--accent);">${section.title} (${section.predictions.length})</h4>`;

                section.predictions.slice(0, 10).forEach(pred => {
                    const item = document.createElement('div');
                    item.className = 'session-item';
                    const time = new Date(pred.timestamp).toLocaleTimeString();
                    const score = (pred.score * 100).toFixed(0);
                    item.innerHTML = `
                    <div style="display: flex; justify-content: space-between; width: 100%;">
                        <span>${time}</span>
                        <span>${score}% confidence</span>
                    </div>
                `;
                    sectionEl.appendChild(item);
                });

                if (section.predictions.length > 10) {
                    const moreEl = document.createElement('div');
                    moreEl.className = 'muted';
                    moreEl.style.textAlign = 'center';
                    moreEl.style.padding = '8px 0';
                    moreEl.textContent = `+${section.predictions.length - 10} more`;
                    sectionEl.appendChild(moreEl);
                }

                el.appendChild(sectionEl);
            });
        }
